name: Build Media3 FFmpeg Extension (with video)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "=== 安装 NDK 25.1.8937393 ==="
          sdkmanager "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Checkout Media3 1.7.1
        run: |
          echo "=== 克隆 Media3 1.7.1 ==="
          git clone --depth 1 --branch 1.7.1 https://github.com/androidx/media.git media
          cd media
          echo "当前目录：$(pwd)"
          ls -la

      - name: Download FFmpeg 5.1.10 source
        run: |
          JNI_DIR="media/libraries/decoder_ffmpeg/src/main/jni"
          
          echo "=== 下载 FFmpeg 5.1.10 ==="
          cd "$JNI_DIR"
          curl -L -o ffmpeg-5.1.10.tar.gz https://ffmpeg.org/releases/ffmpeg-5.1.10.tar.gz
          
          echo "=== 解压 ==="
          tar xzf ffmpeg-5.1.10.tar.gz
          ln -s ffmpeg-5.1.10 ffmpeg
          
          echo "=== 验证 ==="
          ls -la ffmpeg/ | head -10
          echo "FFmpeg 版本：$(cat ffmpeg/VERSION)"

      - name: Build FFmpeg native libraries
        run: |
          cd media
          
          # 模块路径（src/main 目录）
          FFMPEG_MODULE_PATH="$(pwd)/libraries/decoder_ffmpeg/src/main"
          echo "FFMPEG_MODULE_PATH=$FFMPEG_MODULE_PATH"
          
          # NDK 路径
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/25.1.8937393"
          echo "NDK_PATH=$NDK_PATH"
          
          # 主机平台
          HOST_PLATFORM="linux-x86_64"
          echo "HOST_PLATFORM=$HOST_PLATFORM"
          
          # Android API 级别（注意：这是 API 级别，不是架构！）
          ANDROID_API=21
          echo "ANDROID_API=$ANDROID_API"
          
          # 要启用的解码器（视频+音频）
          DECODERS="h264 hevc vp8 vp9 mpeg2video mpeg4 aac ac3 mp3 flac opus vorbis"
          echo "DECODERS=$DECODERS"
          
          # 进入脚本目录
          cd libraries/decoder_ffmpeg/src/main/jni
          
          echo ""
          echo "=== 开始编译 FFmpeg ==="
          ./build_ffmpeg.sh \
              "$FFMPEG_MODULE_PATH" \
              "$NDK_PATH" \
              "$HOST_PLATFORM" \
              "$ANDROID_API" \
              $DECODERS
          
          echo ""
          echo "=== 编译完成，查看输出 ==="
          find "$FFMPEG_MODULE_PATH" -name "*.so" 2>/dev/null | head -30
          
          echo ""
          echo "=== 各架构 so 文件大小 ==="
          find "$FFMPEG_MODULE_PATH" -name "*.so" -exec du -h {} \;

      - name: Build AAR
        run: |
          cd media
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          
          echo "=== 开始编译 AAR ==="
          
          # 模块名是 :libraries:decoder_ffmpeg
          MODULE=":libraries:decoder_ffmpeg"
          echo "模块：$MODULE"
          
          ./gradlew ${MODULE}:assembleRelease --stacktrace 2>&1 | tail -200
          
          echo ""
          echo "=== 查找 AAR 文件 ==="
          find . -name "*.aar" 2>/dev/null
          
          echo ""
          echo "=== AAR 大小 ==="
          find . -name "*.aar" -exec du -h {} \;

      - name: 验证 AAR 内容
        run: |
          echo "=== 查找 AAR 文件 ==="
          AAR_FILE=$(find media -name "*.aar" 2>/dev/null | head -1)
          
          if [ -z "$AAR_FILE" ]; then
            echo "❌ 没找到 AAR 文件"
            exit 1
          fi
          
          echo "AAR 文件：$AAR_FILE"
          echo "大小：$(du -h "$AAR_FILE" | cut -f1)"
          
          echo ""
          echo "=== AAR 内容列表 ==="
          unzip -l "$AAR_FILE"
          
          echo ""
          echo "=== 检查是否有视频渲染器 ==="
          unzip -p "$AAR_FILE" classes.jar > /tmp/classes.jar 2>/dev/null
          if [ -f /tmp/classes.jar ]; then
            jar tf /tmp/classes.jar | grep -i "ffmpeg\|video" | head -20 || echo "没找到 ffmpeg/video 相关类"
          else
            echo "没有 classes.jar"
          fi
          
          echo ""
          echo "=== 检查 jni 目录 ==="
          unzip -l "$AAR_FILE" | grep -i "jni\|so" | head -20 || echo "没找到 jni/so"

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: lib-decoder-ffmpeg-release-with-video
          path: media/**/*.aar
