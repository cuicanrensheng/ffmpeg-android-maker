name: Build FFmpeg 5.1.10 12Video Decode AAR
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  # 12种视频解码 + 常用音频 + 无第三方库
  FFMPEG_FLAGS: >-
    --disable-everything
    --enable-decoder=h264
    --enable-decoder=hevc
    --enable-decoder=av1
    --enable-decoder=vp8
    --enable-decoder=vp9
    --enable-decoder=mpeg4
    --enable-decoder=mpeg2video
    --enable-decoder=mpeg1video
    --enable-decoder=flv
    --enable-decoder=mjpeg
    --enable-decoder=vc1
    --enable-decoder=msmpeg4
    --enable-decoder=aac
    --enable-decoder=aac_latm
    --enable-decoder=mp3
    --enable-decoder=opus
    --enable-decoder=vorbis
    --enable-decoder=ac3
    --enable-decoder=eac3
    --enable-decoder=dca
    --enable-decoder=flac
    --enable-decoder=pcm_s16le
    --enable-demuxer=mp4
    --enable-demuxer=mov
    --enable-demuxer=mkv
    --enable-demuxer=avi
    --enable-demuxer=flv
    --enable-demuxer=mpegts
    --enable-demuxer=mpegps
    --enable-demuxer=hls
    --enable-demuxer=rtsp
    --enable-demuxer=rtmp
    --enable-demuxer=ogg
    --enable-demuxer=wav
    --enable-demuxer=mp3
    --enable-demuxer=aac
    --enable-demuxer=asf
    --enable-demuxer=wmv
    --enable-protocol=http
    --enable-protocol=https
    --enable-protocol=rtmp
    --enable-protocol=rtsp
    --enable-protocol=file
    --enable-protocol=tcp
    --enable-protocol=udp
    --enable-protocol=hls
    --enable-filter=scale
    --enable-filter=crop
    --enable-filter=rotate
    --enable-filter=format
    --enable-mediacodec
    --enable-jni
    --enable-hwaccels
    --enable-neon
    --enable-asm
    --enable-shared
    --disable-static
    --disable-programs
    --disable-ffmpeg
    --disable-ffplay
    --disable-ffprobe
    --disable-doc
    --disable-htmlpages
    --disable-manpages
    --disable-podpages
    --disable-txtpages
    --enable-stripping
    --disable-debug
    --disable-avdevice
    --disable-postproc
    --disable-iconv
    --disable-bzlib

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        abi: [ "armeabi-v7a", "arm64-v8a" ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install nasm yasm git wget unzip zip tar make gcc

      - name: Setup Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_LATEST_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Compile FFmpeg ABI ${{ matrix.abi }}
        run: |
          export ANDROID_SDK_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          export EXTRA_BUILD_CONFIGURATION_FLAGS="${{ env.FFMPEG_FLAGS }}"
          echo "=== FFmpeg 配置参数 ==="
          echo "$EXTRA_BUILD_CONFIGURATION_FLAGS"
          ./ffmpeg-android-maker.sh -android=21 -abis=${{ matrix.abi }}

      - name: 深度 Strip 减小体积
        run: |
          STRIP_TOOL=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          echo "=== 深度 strip FFmpeg so 文件 ==="
          # 只 strip output 目录下的 so，不碰 NDK 系统库
          find ./output -name "*.so" -type f 2>/dev/null | while read sofile; do
            echo "Strip: $sofile"
            $STRIP_TOOL --strip-all "$sofile" 2>/dev/null || echo "跳过: $sofile"
          done
          echo "=== strip 完成 ==="

      - name: 探测实际输出目录
        id: find_output
        run: |
          echo "=== 查找编译产物 ==="
          SO_PATH=$(find ./output -name "libavcodec.so" -type f 2>/dev/null | head -1)
          
          if [ -z "$SO_PATH" ]; then
            echo "❌ 未找到 libavcodec.so"
            find ./output -name "*.so" -type f 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ 找到: $SO_PATH"
          
          # 向上两级就是 ABI 目录 (libavcodec.so → lib → arm64-v8a)
          ABI_DIR=$(dirname $(dirname "$SO_PATH"))
          echo "ABI 输出目录: $ABI_DIR"
          
          ABI_DIR=${ABI_DIR#./}
          echo "OUTPUT_ABI_DIR=$ABI_DIR" >> $GITHUB_ENV

      - name: 打印体积统计
        run: |
          echo "=== 各 so 文件大小 ==="
          find ${{ env.OUTPUT_ABI_DIR }} -name "*.so" -exec du -h {} \;
          echo "=== 单架构总大小 ==="
          du -sh ${{ env.OUTPUT_ABI_DIR }}/

      - name: Upload build output ${{ matrix.abi }}
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.abi }}
          path: ${{ env.OUTPUT_ABI_DIR }}/

  package_aar:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Download armeabi-v7a
        uses: actions/download-artifact@v4
        with:
          name: output-armeabi-v7a
          path: ffmpeg-libs/armeabi-v7a

      - name: Download arm64-v8a
        uses: actions/download-artifact@v4
        with:
          name: output-arm64-v8a
          path: ffmpeg-libs/arm64-v8a

      - name: 检查下载的产物
        run: |
          echo "=== armeabi-v7a ==="
          find ffmpeg-libs/armeabi-v7a -name "*.so" -exec du -h {} \;
          echo "=== arm64-v8a ==="
          find ffmpeg-libs/arm64-v8a -name "*.so" -exec du -h {} \;

      - name: Package AAR
        run: |
          mkdir -p aar/libs/armeabi-v7a aar/libs/arm64-v8a

          # 查找 so 文件实际位置
          V7A_SO=$(find ffmpeg-libs/armeabi-v7a -name "libavcodec.so" -type f 2>/dev/null | head -1)
          V8A_SO=$(find ffmpeg-libs/arm64-v8a -name "libavcodec.so" -type f 2>/dev/null | head -1)
          
          V7A_LIB=$(dirname "$V7A_SO")
          V8A_LIB=$(dirname "$V8A_SO")
          
          echo "armeabi-v7a lib 目录: $V7A_LIB"
          echo "arm64-v8a lib 目录: $V8A_LIB"

          cp $V7A_LIB/lib*.so aar/libs/armeabi-v7a/
          cp $V8A_LIB/lib*.so aar/libs/arm64-v8a/

          echo "=== AAR 内 so 文件 ==="
          find aar -name "*.so" -exec du -h {} \;

          cat > aar/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest package="com.ffmpeg.lib" xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="36"/>
          </manifest>
          EOF

          cd aar
          zip -r ffmpeg-5.1.10-12video.aar AndroidManifest.xml libs

          echo "=== 最终 AAR 大小 ==="
          du -h ffmpeg-5.1.10-12video.aar

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg5.1.10-12Video-AAR
          path: aar/ffmpeg-5.1.10-12video.aar
