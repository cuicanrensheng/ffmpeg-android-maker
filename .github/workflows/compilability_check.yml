name: Build FFmpeg 5.1.10 Lite Decode AAR
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  # ============================================================
  # FFmpeg 5.1.10 精简版配置（播放器专用，约12-15MB）
  # 保留99%场景常用格式，砍掉冷门编解码减小体积
  # ============================================================
  FFMPEG_LITE_FLAGS: >-
    --disable-everything
    --enable-decoder=h264
    --enable-decoder=hevc
    --enable-decoder=av1
    --enable-decoder=vp8
    --enable-decoder=vp9
    --enable-decoder=mpeg4
    --enable-decoder=mpeg2video
    --enable-decoder=mpeg1video
    --enable-decoder=flv
    --enable-decoder=mjpeg
    --enable-decoder=png
    --enable-decoder=aac
    --enable-decoder=aac_latm
    --enable-decoder=mp3
    --enable-decoder=opus
    --enable-decoder=vorbis
    --enable-decoder=ac3
    --enable-decoder=eac3
    --enable-decoder=dca
    --enable-decoder=flac
    --enable-decoder=alac
    --enable-decoder=wavpack
    --enable-decoder=pcm_s16le
    --enable-decoder=pcm_s16be
    --enable-demuxer=mp4
    --enable-demuxer=mov
    --enable-demuxer=mkv
    --enable-demuxer=avi
    --enable-demuxer=flv
    --enable-demuxer=mpegts
    --enable-demuxer=mpegps
    --enable-demuxer=hls
    --enable-demuxer=rtsp
    --enable-demuxer=rtmp
    --enable-demuxer=ogg
    --enable-demuxer=wav
    --enable-demuxer=mp3
    --enable-demuxer=aac
    --enable-demuxer=image2
    --enable-protocol=http
    --enable-protocol=https
    --enable-protocol=rtmp
    --enable-protocol=rtsp
    --enable-protocol=file
    --enable-protocol=tcp
    --enable-protocol=udp
    --enable-protocol=hls
    --enable-filter=scale
    --enable-filter=crop
    --enable-filter=rotate
    --enable-filter=transpose
    --enable-filter=hflip
    --enable-filter=vflip
    --enable-filter=format
    --enable-filter=null
    --enable-mediacodec
    --enable-jni
    --enable-hwaccels
    --enable-neon
    --enable-asm
    --enable-inline-asm
    --enable-gpl
    --enable-version3
    --enable-shared
    --disable-static
    --disable-programs
    --disable-ffmpeg
    --disable-ffplay
    --disable-ffprobe
    --disable-doc
    --disable-htmlpages
    --disable-manpages
    --disable-podpages
    --disable-txtpages
    --enable-stripping

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        abi: [ "armeabi-v7a", "arm64-v8a" ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install meson nasm ninja-build yasm git wget unzip zip tar make gcc

      - name: Setup Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_LATEST_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV
          echo "ANDROID_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Compile FFmpeg ABI ${{ matrix.abi }}
        run: |
          export ANDROID_SDK_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          export EXTRA_BUILD_CONFIGURATION_FLAGS="${{ env.FFMPEG_LITE_FLAGS }}"
          echo "=== FFmpeg 精简版配置已注入 ==="
          echo "$EXTRA_BUILD_CONFIGURATION_FLAGS"
          ./ffmpeg-android-maker.sh -all-free -all-gpl -android=21 -abis=${{ matrix.abi }}

      - name: Strip 调试符号减小体积
        run: |
          STRIP_TOOL=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          echo "=== 查找并 strip so 文件 ==="
          find . -name "libav*.so" -type f 2>/dev/null | while read sofile; do
            echo "Strip: $sofile"
            $STRIP_TOOL "$sofile" 2>/dev/null || echo "跳过: $sofile"
          done
          find . -name "libsw*.so" -type f 2>/dev/null | while read sofile; do
            echo "Strip: $sofile"
            $STRIP_TOOL "$sofile" 2>/dev/null || echo "跳过: $sofile"
          done

      - name: 探测实际输出目录
        id: find_output
        run: |
          echo "=== 查找编译产物位置 ==="
          SO_PATH=$(find . -name "libavcodec.so" -type f 2>/dev/null | head -1)
          
          if [ -z "$SO_PATH" ]; then
            echo "❌ 未找到 libavcodec.so，打印全部目录结构供排查"
            find . -type d | head -50
            echo "=== 查找所有 .so 文件 ==="
            find . -name "*.so" -type f 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ 找到 so 文件: $SO_PATH"
          
          # 智能判断：父目录是 lib 就再往上一级，否则就用父目录
          SO_DIR=$(dirname "$SO_PATH")
          SO_DIR_NAME=$(basename "$SO_DIR")
          
          if [ "$SO_DIR_NAME" = "lib" ]; then
            ABI_DIR=$(dirname "$SO_DIR")
          else
            ABI_DIR="$SO_DIR"
          fi
          
          echo "ABI 输出目录: $ABI_DIR"
          ABI_DIR=${ABI_DIR#./}
          echo "OUTPUT_ABI_DIR=$ABI_DIR" >> $GITHUB_ENV
          echo "OUTPUT_ABI_DIR=$ABI_DIR" >> $GITHUB_OUTPUT

      - name: 打印输出目录结构
        run: |
          echo "=== 输出目录结构 ==="
          ls -la ${{ env.OUTPUT_ABI_DIR }}/
          echo "=== 所有 .so 文件 ==="
          ls -la ${{ env.OUTPUT_ABI_DIR }}/*.so 2>/dev/null || ls -la ${{ env.OUTPUT_ABI_DIR }}/lib/*.so 2>/dev/null
          echo "=== 各 so 文件大小 ==="
          du -h ${{ env.OUTPUT_ABI_DIR }}/*.so 2>/dev/null || du -h ${{ env.OUTPUT_ABI_DIR }}/lib/*.so 2>/dev/null
          echo "=== include 目录 ==="
          ls -la ${{ env.OUTPUT_ABI_DIR }}/include/ 2>/dev/null || echo "无include目录"

      - name: Upload build output ${{ matrix.abi }}
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.abi }}
          path: ${{ env.OUTPUT_ABI_DIR }}/

  package_aar:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Download armeabi-v7a build output
        uses: actions/download-artifact@v4
        with:
          name: output-armeabi-v7a
          path: ffmpeg-libs/armeabi-v7a

      - name: Download arm64-v8a build output
        uses: actions/download-artifact@v4
        with:
          name: output-arm64-v8a
          path: ffmpeg-libs/arm64-v8a

      - name: 检查下载的产物结构
        run: |
          echo "=== armeabi-v7a ==="
          ls -la ffmpeg-libs/armeabi-v7a/
          echo "=== arm64-v8a ==="
          ls -la ffmpeg-libs/arm64-v8a/
          echo "=== armeabi-v7a so文件 ==="
          ls -la ffmpeg-libs/armeabi-v7a/*.so 2>/dev/null || ls -la ffmpeg-libs/armeabi-v7a/lib/*.so 2>/dev/null
          echo "=== arm64-v8a so文件 ==="
          ls -la ffmpeg-libs/arm64-v8a/*.so 2>/dev/null || ls -la ffmpeg-libs/arm64-v8a/lib/*.so 2>/dev/null

      - name: Package full AAR library
        run: |
          mkdir -p aar/libs/armeabi-v7a aar/libs/arm64-v8a aar/headers

          find_lib_dir() {
            if [ -f "$1/libavcodec.so" ]; then
              echo "$1"
            elif [ -f "$1/lib/libavcodec.so" ]; then
              echo "$1/lib"
            else
              echo "$1"
            fi
          }

          find_include_dir() {
            if [ -d "$1/include" ]; then
              echo "$1/include"
            else
              echo "$1"
            fi
          }

          V7A_LIB=$(find_lib_dir "ffmpeg-libs/armeabi-v7a")
          V8A_LIB=$(find_lib_dir "ffmpeg-libs/arm64-v8a")
          V8A_INC=$(find_include_dir "ffmpeg-libs/arm64-v8a")

          echo "armeabi-v7a lib 目录: $V7A_LIB"
          echo "arm64-v8a lib 目录: $V8A_LIB"
          echo "头文件目录: $V8A_INC"

          cp -r $V8A_INC/* aar/headers/ 2>/dev/null || echo "警告: 未找到头文件"
          cp $V7A_LIB/lib*.so aar/libs/armeabi-v7a/ 2>/dev/null || cp $V7A_LIB/*.so aar/libs/armeabi-v7a/ 2>/dev/null
          cp $V8A_LIB/lib*.so aar/libs/arm64-v8a/ 2>/dev/null || cp $V8A_LIB/*.so aar/libs/arm64-v8a/ 2>/dev/null

          echo "=== 复制后的 AAR 结构 ==="
          find aar -type f | head -30
          echo "=== AAR 总大小 ==="
          du -sh aar/

          cat > aar/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest package="com.ffmpeg.lib" xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="36"/>
          </manifest>
          EOF

          cd aar
          zip -r ffmpeg-5.1.10-lite-decode.aar AndroidManifest.xml libs headers

      - name: Upload compiled AAR
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg5.1.10-LiteDecode-AAR
          path: aar/ffmpeg-5.1.10-lite-decode.aar
